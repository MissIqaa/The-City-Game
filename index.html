<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Pronunciation Drive 🚗</title>
    <style>
        :root {
            --sky: #87CEEB;
            --road: #444;
            --accent: #FFD700;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: var(--sky);
        }

        /* Game Stage */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Background/City */
        .city-bg {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #1e90ff, #87CEEB);
            overflow: hidden;
        }

        .building {
            position: absolute;
            bottom: 0;
            background: #5D6D7E;
            width: 60px;
            border-top: 3px solid #2C3E50;
        }

        /* Road and Car */
        .road-area {
            height: 150px;
            background: var(--road);
            position: relative;
            border-top: 5px solid #fff;
        }

        .lane-line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fff, #fff 50px, transparent 50px, transparent 100px);
        }

        #car {
            position: absolute;
            bottom: 40px;
            left: 10%;
            font-size: 50px;
            /* FIX: We flip the car horizontally so it faces right */
            transform: scaleX(-1);
            transition: left 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.1s;
            z-index: 10;
        }

        #obstacle {
            position: absolute;
            bottom: 40px;
            left: 60%;
            font-size: 50px;
            z-index: 5;
            transition: transform 0.5s;
        }

        /* Animations */
        @keyframes crash {
            0% { transform: scaleX(-1) rotate(0deg); }
            20% { transform: scaleX(-1) rotate(-20deg) translateX(10px); } /* Fixed translation for flipped car */
            40% { transform: scaleX(-1) rotate(20deg) translateX(-10px); }
            100% { transform: scaleX(-1) rotate(0deg); }
        }
        .crash-anim { animation: crash 0.5s ease; }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0; width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .stats-panel {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .progress-box {
            width: 80%;
            height: 12px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--success);
            transition: width 0.5s;
        }

        .sentence-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
        }

        #sentence-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        /* Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        #mic-btn { background: #3498db; color: white; }
        #mic-btn.active { background: #e67e22; animation: pulse 1s infinite; }
        #retry-btn { background: #95a5a6; color: white; display: none; }
        #next-btn { background: var(--success); color: white; display: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #feedback-msg {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }

        /* Final Screen */
        #game-over {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(44, 62, 80, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
        }
    </style>
</head>
<body>

<div id="game-over">
    <h1>🏆 Game Complete!</h1>
    <p id="final-score">Your Score: 0</p>
    <button onclick="location.reload()" style="background:var(--success); color:white;">Play Again</button>
</div>

<div id="game-container">
    <div id="ui-layer">
        <div class="stats-panel">
            <span id="lvl-indicator">Level: 1 / 10</span>
            <span id="score-indicator">Score: 0</span>
        </div>
        
        <div class="progress-box">
            <div id="progress-bar"></div>
        </div>

        <div class="sentence-card">
            <div id="sentence-text">Loading...</div>
            <div id="feedback-msg"></div>
            
            <div class="controls">
                <button id="mic-btn">🎤 Hold to Speak</button>
                <button id="retry-btn">🔄 Retry</button>
                <button id="next-btn">Next Level ➔</button>
            </div>
        </div>
    </div>

    <div class="city-bg" id="city"></div>

    <div class="road-area">
        <div class="lane-line"></div>
        <div id="car">🚗</div>
        <div id="obstacle">🚧</div>
    </div>
</div>

<script>
    const sentences = [
        "The park is big and green",
        "The library is quiet and clean",
        "The market is busy and noisy",
        "The shopping mall is huge and bright",
        "The museum is old and interesting",
        "The hospital is big and modern",
        "The cinema is dark and comfortable",
        "The playground is fun and colourful",
        "The train station is busy and loud",
        "The city park is peaceful and beautiful"
    ];

    let currentLevel = 0;
    let score = 0;
    let recognition;
    let isCorrect = false;

    // Initialize City Buildings
    const city = document.getElementById('city');
    for (let i = 0; i < 20; i++) {
        const b = document.createElement('div');
        b.className = 'building';
        b.style.left = (i * 100) + 'px';
        b.style.height = (Math.random() * 200 + 100) + 'px';
        b.style.opacity = Math.random() * 0.5 + 0.3;
        city.appendChild(b);
    }

    // Speech Recognition Setup
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
            const spokenText = event.results[0][0].transcript;
            evaluatePronunciation(spokenText);
        };

        recognition.onend = () => {
            document.getElementById('mic-btn').classList.remove('active');
            document.getElementById('mic-btn').innerText = "🎤 Hold to Speak";
        };
    }

    // Audio Constraints & Initialization
    async function startMic() {
        try {
            await navigator.mediaDevices.getUserMedia({
                audio: { noiseSuppression: true, echoCancellation: true, autoGainControl: true }
            });
            recognition.start();
            document.getElementById('mic-btn').classList.add('active');
            document.getElementById('mic-btn').innerText = "Listening...";
        } catch (err) {
            alert("Microphone access is required to play this game.");
        }
    }

    function updateLevel() {
        if (currentLevel >= sentences.length) {
            showGameOver();
            return;
        }
        
        isCorrect = false;
        document.getElementById('sentence-text').innerText = sentences[currentLevel];
        document.getElementById('lvl-indicator').innerText = `Level: ${currentLevel + 1} / ${sentences.length}`;
        document.getElementById('progress-bar').style.width = `${(currentLevel / sentences.length) * 100}%`;
        document.getElementById('feedback-msg').innerText = "";
        document.getElementById('feedback-msg').style.color = "#333";
        
        // Reset Visuals
        document.getElementById('car').style.left = "10%";
        document.getElementById('car').classList.remove('crash-anim');
        document.getElementById('obstacle').style.transform = "scale(1)";
        document.getElementById('obstacle').style.opacity = "1";
        
        // Buttons
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('retry-btn').style.display = "none";
        document.getElementById('mic-btn').style.display = "block";
    }

    function evaluatePronunciation(spoken) {
        const target = sentences[currentLevel].toLowerCase().replace(/[.,!]/g, "");
        const input = spoken.toLowerCase().replace(/[.,!]/g, "");
        
        const similarity = calculateSimilarity(target, input);
        
        if (similarity > 0.8) {
            handleSuccess();
        } else if (input.split(" ").length < 2) {
            handleTooShort();
        } else {
            handleFailure();
        }
    }

    function handleSuccess() {
        isCorrect = true;
        score += 10;
        document.getElementById('score-indicator').innerText = `Score: ${score}`;
        document.getElementById('feedback-msg').innerText = "Correct! +10 points";
        document.getElementById('feedback-msg').style.color = "var(--success)";
        
        // Animation: Car passes obstacle
        document.getElementById('car').style.left = "75%";
        document.getElementById('obstacle').style.opacity = "0";
        
        // Audio
        playTone(600, 0.2); 

        // Show Next Button
        document.getElementById('mic-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    }

    function handleFailure() {
        document.getElementById('feedback-msg').innerText = "Try again";
        document.getElementById('feedback-msg').style.color = "var(--error)";
        document.getElementById('car').classList.add('crash-anim');
        playTone(150, 0.4); 
        document.getElementById('retry-btn').style.display = "block";
    }

    function handleTooShort() {
        document.getElementById('feedback-msg').innerText = "Please speak clearly and try again.";
        document.getElementById('feedback-msg').style.color = "#e67e22";
    }

    // Similarity Math (Levenshtein Distance)
    function calculateSimilarity(s1, s2) {
        let longer = s1;
        let shorter = s2;
        if (s1.length < s2.length) {
            longer = s2;
            shorter = s1;
        }
        let longerLength = longer.length;
        if (longerLength === 0) return 1.0;
        return (longerLength - editDistance(longer, shorter)) / parseFloat(longerLength);
    }

    function editDistance(s1, s2) {
        let costs = [];
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else if (j > 0) {
                    let newValue = costs[j - 1];
                    if (s1.charAt(i - 1) != s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }

    // Simple Synth Sounds
    function playTone(freq, duration) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = freq;
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
    }

    function showGameOver() {
        document.getElementById('game-over').style.display = "flex";
        document.getElementById('final-score').innerText = `Your Final Score: ${score}`;
    }

    // Button Listeners
    document.getElementById('mic-btn').addEventListener('click', startMic);
    document.getElementById('retry-btn').addEventListener('click', () => {
        document.getElementById('car').classList.remove('crash-anim');
        document.getElementById('feedback-msg').innerText = "";
        document.getElementById('retry-btn').style.display = "none";
    });
    document.getElementById('next-btn').addEventListener('click', () => {
        currentLevel++;
        updateLevel();
    });

    // Start Game
    updateLevel();

</script>
</body>
</html>
